<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkyDeal — контакты</title>

  <link rel="stylesheet" href="css/style.css" />

  <!-- AOS -->
  <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
</head>
<body>

<header class="header">
  <div class="container nav">
    <a class="logo" href="index.html">SkyDeal</a>

    <nav class="menu">
      <a href="index.html">Главная</a>
      <a href="flights.html">Билеты</a>
      <a href="tours.html">Туры</a>
      <a href="offers.html">Акции</a>
      <a href="profile.html">Профиль</a>
      <a class="active" href="contacts.html">Контакты</a>
    </nav>
  </div>
</header>

<main class="section contact-page">
  <div class="container">

    <!-- HERO -->
    <div class="contact-hero" data-aos="fade-up">
      <h1>Свяжитесь с нами</h1>
      <p>Мы всегда готовы помочь вам с бронированием и вопросами ✈️</p>
    </div>

    <div class="contact-grid">

      <!-- ЛЕВАЯ ЧАСТЬ -->
      <section class="form-card" data-aos="fade-right">
        <span class="tag">Контакты</span>
        <h2>Наши данные</h2>

        <div class="stack">

          <div class="mini-card">
            <div class="icon">📞</div>
            <div>
              <strong>Телефон</strong>
              <span class="muted">+998 90 123 45 67</span>
            </div>
          </div>

          <div class="mini-card">
            <div class="icon">📧</div>
            <div>
              <strong>Email</strong>
              <span class="muted">info@skydeal.uz</span>
            </div>
          </div>

          <div class="mini-card">
            <div class="icon">📍</div>
            <div>
              <strong>Адрес</strong>
              <span class="muted">Ташкент, Узбекистан</span>
            </div>
          </div>

        </div>

        <!-- КАРТИНКА -->
        <div class="contact-image">
          <img src="https://images.unsplash.com/photo-1502920917128-1aa500764b6c?auto=format&fit=crop&w=1000&q=80" alt="">
        </div>

      </section>

      <!-- ПРАВАЯ ЧАСТЬ -->
      <section class="form-card" data-aos="fade-left">
        <h3>Форма обратной связи</h3>

        <form class="contact-form">

          <div class="field">
            <label>Имя</label>
            <input placeholder="Ваше имя">
          </div>

          <div class="field">
            <label>Email</label>
            <input type="email" placeholder="you@example.com">
          </div>

          <div class="field">
            <label>Сообщение</label>
            <textarea placeholder="Напишите ваш вопрос..."></textarea>
          </div>

          <button class="btn btn-primary">Отправить сообщение</button>

        </form>

      </section>

    </div>

  </div>
</main>

<footer class="footer">
  <div class="container">
    <p>© <span data-year></span> SkyDeal</p>
  </div>
</footer>

<script src="js/app.js"></script>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init({
    once: true,
    duration: 900
  });

  document.querySelector('[data-year]').textContent = new Date().getFullYear();
</script>

</body>
</html>
