<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyDeal — бронирование</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://unpkg.com/aos@2.3.1/dist/aos.css"
  />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container nav">
      <a class="logo" href="index.html">SkyDeal</a>

      <nav class="menu">
        <a href="index.html">Главная</a>
        <a href="flights.html">Билеты</a>
        <a href="tours.html">Туры</a>
        <a href="offers.html">Акции</a>
        <a href="profile.html">Профиль</a>
        <a href="contacts.html">Контакты</a>
      </nav>

      <div class="nav-actions">
        <a class="btn btn-soft" href="login.html">Вход</a>
        <a class="btn btn-primary" href="register.html">Регистрация</a>
      </div>
    </div>
  </header>

  <main class="section booking-page">
    <div class="container">
      <div class="booking-layout">
        <section class="form-card booking-card" data-aos="fade-right" data-aos-duration="900">
          <span class="tag">Бронирование</span>
          <h2 class="booking-title">Заполните данные пассажира</h2>

          <form class="booking-form" id="bookingForm">
            <div class="form-row booking-form-row">
              <div class="field">
                <label for="fullName">Имя и фамилия</label>
                <input
                  id="fullName"
                  name="fullName"
                  type="text"
                  required
                  placeholder="Руслан Алиев"
                />
              </div>

              <div class="field">
                <label for="passport">Паспорт</label>
                <input
                  id="passport"
                  name="passport"
                  type="text"
                  required
                  placeholder="AA1234567"
                />
              </div>
            </div>

            <div class="form-row booking-form-row">
              <div class="field">
                <label for="email">Email</label>
                <input
                  id="email"
                  name="email"
                  type="email"
                  required
                  placeholder="you@example.com"
                />
              </div>

              <div class="field">
                <label for="phone">Телефон</label>
                <input
                  id="phone"
                  name="phone"
                  type="text"
                  required
                  placeholder="+998 90 123 45 67"
                />
              </div>
            </div>

            <div class="form-row booking-form-row">
              <div class="field">
                <label for="baggage">Доп. багаж</label>
                <select name="baggage" id="baggage">
                  <option value="0">Без багажа</option>
                  <option value="150000">+10 кг — 150 000 сум</option>
                  <option value="300000">+20 кг — 300 000 сум</option>
                </select>
              </div>

              <div class="field">
                <label for="promo">Промокод</label>
                <input
                  id="promo"
                  name="promo"
                  type="text"
                  placeholder="SUMMER10"
                />
              </div>
            </div>

            <button class="btn btn-primary btn-full" type="submit">
              Подтвердить заказ
            </button>
          </form>
        </section>

        <aside class="summary-box booking-summary" id="bookingSummary" data-aos="fade-left" data-aos-duration="900"></aside>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© <span data-year></span> SkyDeal</p>
    </div>
  </footer>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 900,
      once: true
    });
  </script>

  <script src="data/flights.js"></script>
  <script src="data/tours.js"></script>
  <script src="js/app.js"></script>
  <script src="js/booking.js"></script>
</body>
</html>
