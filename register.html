<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SkyDeal — регистрация</title><link rel="stylesheet" href="css/style.css"></head><body>
<header class="header"><div class="container nav"><a class="logo" href="index.html">SkyDeal</a></div></header>
